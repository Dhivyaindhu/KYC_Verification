<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Playto KYC — Merchant Verification</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0b0f;
      --surface: #12141a;
      --surface-2: #1a1d26;
      --surface-3: #22263a;
      --border: #2a2e42;
      --border-light: #353a52;
      --text: #e8eaf6;
      --text-2: #9499b8;
      --text-3: #5a6080;
      --accent: #6366f1;
      --accent-hover: #7c7ff5;
      --accent-glow: rgba(99,102,241,0.15);
      --green: #10b981;
      --green-bg: rgba(16,185,129,0.1);
      --red: #ef4444;
      --red-bg: rgba(239,68,68,0.1);
      --amber: #f59e0b;
      --amber-bg: rgba(245,158,11,0.1);
      --blue: #3b82f6;
      --blue-bg: rgba(59,130,246,0.1);
      --purple: #8b5cf6;
      --purple-bg: rgba(139,92,246,0.1);
      --radius: 12px;
      --radius-sm: 8px;
      --font: 'Space Grotesk', sans-serif;
      --mono: 'JetBrains Mono', monospace;
    }

    html, body, #root { height: 100%; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* Layout */
    .app { display: flex; height: 100vh; overflow: hidden; }
    .sidebar {
      width: 260px; min-width: 260px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      padding: 0;
      overflow-y: auto;
    }
    .main { flex: 1; overflow-y: auto; padding: 32px 40px; }

    /* Brand */
    .brand {
      padding: 24px 24px 20px;
      border-bottom: 1px solid var(--border);
    }
    .brand-logo {
      display: flex; align-items: center; gap: 10px;
      font-size: 18px; font-weight: 700; letter-spacing: -0.3px;
    }
    .brand-dot {
      width: 32px; height: 32px; border-radius: 9px;
      background: linear-gradient(135deg, var(--accent), var(--purple));
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
    }
    .brand-sub { font-size: 11px; color: var(--text-3); margin-top: 2px; font-family: var(--mono); }

    /* Nav */
    .nav { padding: 12px; flex: 1; }
    .nav-section-label {
      font-size: 10px; font-weight: 600; letter-spacing: 1.2px;
      color: var(--text-3); text-transform: uppercase;
      padding: 12px 12px 6px;
    }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: var(--radius-sm);
      cursor: pointer; font-size: 14px; font-weight: 500;
      color: var(--text-2); transition: all 0.15s;
      border: none; background: none; width: 100%; text-align: left;
    }
    .nav-item:hover { background: var(--surface-2); color: var(--text); }
    .nav-item.active { background: var(--accent-glow); color: var(--accent); }
    .nav-item .icon { font-size: 16px; width: 20px; text-align: center; }
    .nav-badge {
      margin-left: auto; font-size: 11px; font-weight: 600;
      padding: 2px 7px; border-radius: 20px;
      background: var(--red-bg); color: var(--red);
    }
    .nav-badge.info { background: var(--amber-bg); color: var(--amber); }

    /* User card at bottom */
    .user-card {
      margin: 12px;
      padding: 12px; border-radius: var(--radius-sm);
      background: var(--surface-2); border: 1px solid var(--border);
    }
    .user-card-name { font-size: 13px; font-weight: 600; }
    .user-card-role {
      font-size: 11px; color: var(--text-3);
      font-family: var(--mono);
    }
    .user-card-actions { display: flex; gap: 6px; margin-top: 10px; }

    /* Buttons */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 9px 18px; border-radius: var(--radius-sm);
      font-size: 13px; font-weight: 600; cursor: pointer;
      border: none; font-family: var(--font); transition: all 0.15s;
    }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-ghost {
      background: transparent; color: var(--text-2);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { background: var(--surface-2); color: var(--text); }
    .btn-danger { background: var(--red-bg); color: var(--red); border: 1px solid rgba(239,68,68,0.2); }
    .btn-danger:hover { background: rgba(239,68,68,0.2); }
    .btn-success { background: var(--green-bg); color: var(--green); border: 1px solid rgba(16,185,129,0.2); }
    .btn-success:hover { background: rgba(16,185,129,0.2); }
    .btn-amber { background: var(--amber-bg); color: var(--amber); border: 1px solid rgba(245,158,11,0.2); }
    .btn-amber:hover { background: rgba(245,158,11,0.2); }
    .btn-sm { padding: 6px 12px; font-size: 12px; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-full { width: 100%; justify-content: center; }

    /* Cards */
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 24px;
    }
    .card-sm { padding: 16px; }
    .card-hover { cursor: pointer; transition: border-color 0.15s, background 0.15s; }
    .card-hover:hover { border-color: var(--accent); background: var(--surface-2); }

    /* Page header */
    .page-header { margin-bottom: 28px; }
    .page-title { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; }
    .page-sub { color: var(--text-2); font-size: 14px; margin-top: 4px; }
    .page-header-row { display: flex; align-items: flex-start; justify-content: space-between; }

    /* Grid */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
    .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }

    /* Stat card */
    .stat-card { padding: 20px; }
    .stat-label { font-size: 12px; color: var(--text-3); font-weight: 500; text-transform: uppercase; letter-spacing: 0.8px; }
    .stat-value { font-size: 32px; font-weight: 700; margin: 6px 0 2px; letter-spacing: -1px; }
    .stat-sub { font-size: 12px; color: var(--text-3); }

    /* Status badge */
    .badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 10px; border-radius: 20px;
      font-size: 11px; font-weight: 600; letter-spacing: 0.3px;
    }
    .badge-dot { width: 6px; height: 6px; border-radius: 50%; }
    .badge-draft { background: var(--surface-3); color: var(--text-2); }
    .badge-submitted { background: var(--blue-bg); color: var(--blue); }
    .badge-under_review { background: var(--amber-bg); color: var(--amber); }
    .badge-more_info_requested { background: var(--purple-bg); color: var(--purple); }
    .badge-approved { background: var(--green-bg); color: var(--green); }
    .badge-rejected { background: var(--red-bg); color: var(--red); }

    /* Table */
    .table-wrap { border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; }
    table { width: 100%; border-collapse: collapse; }
    th {
      background: var(--surface-2); padding: 12px 16px;
      font-size: 11px; font-weight: 600; color: var(--text-3);
      text-transform: uppercase; letter-spacing: 0.8px;
      text-align: left; border-bottom: 1px solid var(--border);
    }
    td { padding: 14px 16px; font-size: 13px; border-bottom: 1px solid var(--border); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--surface-2); }

    /* Form */
    .form-group { margin-bottom: 18px; }
    .form-label { display: block; font-size: 12px; font-weight: 600; color: var(--text-2); margin-bottom: 6px; }
    .form-input {
      width: 100%; padding: 10px 14px;
      background: var(--surface-2); border: 1px solid var(--border);
      border-radius: var(--radius-sm); color: var(--text);
      font-size: 14px; font-family: var(--font);
      transition: border-color 0.15s;
      outline: none;
    }
    .form-input:focus { border-color: var(--accent); }
    .form-input::placeholder { color: var(--text-3); }
    select.form-input { cursor: pointer; }
    textarea.form-input { resize: vertical; min-height: 80px; }
    .form-hint { font-size: 11px; color: var(--text-3); margin-top: 4px; }
    .form-error { font-size: 11px; color: var(--red); margin-top: 4px; }
    .form-section { margin-bottom: 28px; }
    .form-section-title {
      font-size: 13px; font-weight: 600; color: var(--accent);
      border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-bottom: 18px;
      text-transform: uppercase; letter-spacing: 0.8px;
    }

    /* Step indicator */
    .steps { display: flex; align-items: center; gap: 0; margin-bottom: 32px; }
    .step { display: flex; align-items: center; flex: 1; }
    .step-dot {
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; flex-shrink: 0;
      border: 2px solid var(--border); color: var(--text-3);
      background: var(--surface-2);
    }
    .step.active .step-dot { border-color: var(--accent); color: var(--accent); background: var(--accent-glow); }
    .step.done .step-dot { border-color: var(--green); background: var(--green-bg); color: var(--green); }
    .step-label { font-size: 12px; color: var(--text-3); margin-left: 8px; font-weight: 500; }
    .step.active .step-label { color: var(--text); }
    .step-line { flex: 1; height: 1px; background: var(--border); margin: 0 12px; }
    .step.done + .step .step-line { background: var(--green); }

    /* Upload zone */
    .upload-zone {
      border: 2px dashed var(--border); border-radius: var(--radius-sm);
      padding: 28px; text-align: center; cursor: pointer;
      transition: all 0.15s;
    }
    .upload-zone:hover, .upload-zone.drag-over {
      border-color: var(--accent); background: var(--accent-glow);
    }
    .upload-zone.uploaded { border-color: var(--green); background: var(--green-bg); }
    .upload-icon { font-size: 28px; margin-bottom: 8px; }
    .upload-label { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
    .upload-sub { font-size: 11px; color: var(--text-3); }

    /* Alert */
    .alert {
      padding: 14px 16px; border-radius: var(--radius-sm);
      font-size: 13px; display: flex; gap: 10px; align-items: flex-start;
      margin-bottom: 16px;
    }
    .alert-error { background: var(--red-bg); color: var(--red); border: 1px solid rgba(239,68,68,0.2); }
    .alert-success { background: var(--green-bg); color: var(--green); border: 1px solid rgba(16,185,129,0.2); }
    .alert-info { background: var(--blue-bg); color: var(--blue); border: 1px solid rgba(59,130,246,0.2); }
    .alert-amber { background: var(--amber-bg); color: var(--amber); border: 1px solid rgba(245,158,11,0.2); }

    /* Timeline */
    .timeline { display: flex; flex-direction: column; gap: 0; }
    .timeline-item { display: flex; gap: 14px; position: relative; }
    .timeline-line { width: 2px; background: var(--border); position: absolute; left: 15px; top: 32px; bottom: -16px; }
    .timeline-item:last-child .timeline-line { display: none; }
    .timeline-dot {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--surface-2); border: 2px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; flex-shrink: 0; position: relative; z-index: 1;
    }
    .timeline-content { flex: 1; padding-bottom: 20px; }
    .timeline-title { font-size: 13px; font-weight: 600; }
    .timeline-sub { font-size: 11px; color: var(--text-3); margin-top: 2px; }
    .timeline-note {
      margin-top: 8px; padding: 10px 12px;
      background: var(--surface-2); border-radius: var(--radius-sm);
      font-size: 12px; color: var(--text-2);
      border-left: 3px solid var(--accent);
    }

    /* Modal */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000; padding: 24px;
    }
    .modal {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 28px;
      width: 100%; max-width: 480px;
    }
    .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
    .modal-sub { font-size: 13px; color: var(--text-2); margin-bottom: 20px; }
    .modal-actions { display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end; }

    /* At-risk chip */
    .at-risk-chip {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 8px; border-radius: 4px;
      background: var(--red-bg); color: var(--red);
      font-size: 10px; font-weight: 700; letter-spacing: 0.5px;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; } 50% { opacity: 0.6; }
    }

    /* Auth page */
    .auth-wrap {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: var(--bg);
      background-image: radial-gradient(circle at 30% 20%, rgba(99,102,241,0.08) 0%, transparent 50%),
                        radial-gradient(circle at 70% 80%, rgba(139,92,246,0.06) 0%, transparent 50%);
    }
    .auth-card {
      width: 420px; background: var(--surface);
      border: 1px solid var(--border); border-radius: 16px;
      padding: 36px;
    }
    .auth-title { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
    .auth-sub { font-size: 13px; color: var(--text-2); margin-bottom: 28px; }

    /* Detail layout */
    .detail-wrap { display: grid; grid-template-columns: 1fr 360px; gap: 24px; align-items: start; }
    .detail-section { margin-bottom: 24px; }
    .detail-section-title {
      font-size: 11px; font-weight: 600; color: var(--text-3);
      text-transform: uppercase; letter-spacing: 0.8px;
      margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1px solid var(--border);
    }
    .detail-field { margin-bottom: 12px; }
    .detail-field-label { font-size: 11px; color: var(--text-3); margin-bottom: 2px; }
    .detail-field-value { font-size: 14px; font-weight: 500; }
    .detail-field-mono { font-family: var(--mono); font-size: 13px; }

    /* Empty state */
    .empty { text-align: center; padding: 48px; color: var(--text-3); }
    .empty-icon { font-size: 40px; margin-bottom: 12px; }
    .empty-title { font-size: 16px; font-weight: 600; color: var(--text-2); margin-bottom: 6px; }
    .empty-sub { font-size: 13px; }

    /* Loading */
    .spinner {
      width: 20px; height: 20px; border-radius: 50%;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      animation: spin 0.7s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Tabs */
    .tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
    .tab {
      padding: 10px 16px; font-size: 13px; font-weight: 500;
      cursor: pointer; border-bottom: 2px solid transparent;
      color: var(--text-2); transition: all 0.15s;
      background: none; border-top: none; border-left: none; border-right: none;
      font-family: var(--font);
    }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* Doc grid */
    .doc-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .doc-card {
      padding: 14px; border-radius: var(--radius-sm);
      border: 1px solid var(--border); background: var(--surface-2);
    }
    .doc-type { font-size: 11px; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.8px; }
    .doc-name { font-size: 13px; font-weight: 600; margin: 4px 0; }
    .doc-meta { font-size: 11px; color: var(--text-3); }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

// ─── API Layer ────────────────────────────────────────────────────────────────
const API_BASE = window.location.origin + '/api';

const api = {
  async request(method, path, body, token, isForm = false) {
    const headers = {};
    if (token) headers['Authorization'] = `Token ${token}`;
    if (!isForm) headers['Content-Type'] = 'application/json';

    const res = await fetch(`${API_BASE}${path}`, {
      method,
      headers,
      body: isForm ? body : (body ? JSON.stringify(body) : undefined),
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw { status: res.status, data };
    return data;
  },
  get: (path, token) => api.request('GET', path, null, token),
  post: (path, body, token) => api.request('POST', path, body, token),
  put: (path, body, token) => api.request('PUT', path, body, token),
  patch: (path, body, token) => api.request('PATCH', path, body, token),
  upload: (path, form, token) => api.request('POST', path, form, token, true),
};

// ─── Helpers ──────────────────────────────────────────────────────────────────
const STATUS_META = {
  draft: { label: 'Draft', cls: 'badge-draft', icon: '✏️' },
  submitted: { label: 'Submitted', cls: 'badge-submitted', icon: '📤' },
  under_review: { label: 'Under Review', cls: 'badge-under_review', icon: '🔍' },
  more_info_requested: { label: 'More Info', cls: 'badge-more_info_requested', icon: '💬' },
  approved: { label: 'Approved', cls: 'badge-approved', icon: '✅' },
  rejected: { label: 'Rejected', cls: 'badge-rejected', icon: '❌' },
};

const DOC_LABELS = {
  pan: 'PAN Card', aadhaar: 'Aadhaar Card',
  bank_statement: 'Bank Statement', business_proof: 'Business Proof',
};

function StatusBadge({ status }) {
  const m = STATUS_META[status] || { label: status, cls: 'badge-draft', icon: '?' };
  return <span className={`badge ${m.cls}`}>{m.icon} {m.label}</span>;
}

function formatDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleString('en-IN', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
}

function Alert({ type = 'error', children }) {
  const icons = { error: '⚠️', success: '✅', info: 'ℹ️', amber: '⚡' };
  return <div className={`alert alert-${type}`}>{icons[type]} {children}</div>;
}

function Spinner() { return <span className="spinner" />; }

// ─── Auth Pages ───────────────────────────────────────────────────────────────
function AuthPage({ onLogin }) {
  const [mode, setMode] = useState('login');
  const [form, setForm] = useState({ email: '', password: '', full_name: '', role: 'merchant' });
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');

  const set = k => e => setForm(f => ({ ...f, [k]: e.target.value }));

  const submit = async () => {
    setError(''); setLoading(true);
    try {
      let data;
      if (mode === 'login') {
        data = await api.post('/auth/login/', { email: form.email, password: form.password });
      } else {
        data = await api.post('/auth/register/', form);
      }
      onLogin(data.token, data.user);
    } catch (e) {
      const msg = e.data?.non_field_errors?.[0] || e.data?.email?.[0] || e.data?.password?.[0] || e.data?.full_name?.[0] || e.data?.role?.[0] || e.data?.detail || (e instanceof TypeError ? 'Cannot reach server — is the backend running?' : JSON.stringify(e.data)) || 'Something went wrong';
      setError(msg);
    } finally { setLoading(false); }
  };

  return (
    <div className="auth-wrap">
      <div className="auth-card">
        <div className="brand-logo" style={{marginBottom: 24}}>
          <div className="brand-dot">▲</div>
          <span>Playto KYC</span>
        </div>
        <div className="auth-title">{mode === 'login' ? 'Welcome back' : 'Create account'}</div>
        <div className="auth-sub">{mode === 'login' ? 'Sign in to your account' : 'Start your KYC journey'}</div>
        {error && <Alert type="error">{error}</Alert>}
        {mode === 'register' && (
          <div className="form-group">
            <label className="form-label">Full Name</label>
            <input className="form-input" placeholder="Your full name" value={form.full_name} onChange={set('full_name')} />
          </div>
        )}
        <div className="form-group">
          <label className="form-label">Email</label>
          <input className="form-input" type="email" placeholder="you@company.com" value={form.email} onChange={set('email')} />
        </div>
        <div className="form-group">
          <label className="form-label">Password</label>
          <input className="form-input" type="password" placeholder="••••••••" value={form.password} onChange={set('password')} />
        </div>
        {mode === 'register' && (
          <div className="form-group">
            <label className="form-label">Role</label>
            <select className="form-input" value={form.role} onChange={set('role')}>
              <option value="merchant">Merchant</option>
              <option value="reviewer">Reviewer</option>
            </select>
          </div>
        )}
        <button className="btn btn-primary btn-full" onClick={submit} disabled={loading}>
          {loading ? <Spinner /> : (mode === 'login' ? 'Sign In' : 'Create Account')}
        </button>
        <div style={{textAlign:'center', marginTop:16, fontSize:13, color:'var(--text-3)'}}>
          {mode === 'login' ? "Don't have an account? " : 'Already have an account? '}
          <span style={{color:'var(--accent)', cursor:'pointer', fontWeight:600}}
            onClick={() => setMode(m => m === 'login' ? 'register' : 'login')}>
            {mode === 'login' ? 'Sign up' : 'Sign in'}
          </span>
        </div>
      </div>
    </div>
  );
}

// ─── KYC Form (Merchant) ──────────────────────────────────────────────────────
const STEPS = ['Personal Info', 'Business Info', 'Documents', 'Review & Submit'];

function KYCForm({ token, existing, onDone }) {
  const [step, setStep] = useState(0);
  const [form, setForm] = useState({
    full_name: existing?.full_name || '',
    date_of_birth: existing?.date_of_birth || '',
    pan_number: existing?.pan_number || '',
    aadhaar_number: existing?.aadhaar_number || '',
    business_name: existing?.business_name || '',
    business_type: existing?.business_type || '',
    gst_number: existing?.gst_number || '',
    business_address: existing?.business_address || '',
    bank_account_number: existing?.bank_account_number || '',
    bank_ifsc_code: existing?.bank_ifsc_code || '',
    bank_name: existing?.bank_name || '',
  });
  const [docs, setDocs] = useState({});
  const [uploadedDocs, setUploadedDocs] = useState(
    existing?.documents?.reduce((acc, d) => ({ ...acc, [d.doc_type]: d }), {}) || {}
  );
  const [submissionId, setSubmissionId] = useState(existing?.id || null);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');
  const [saving, setSaving] = useState(false);

  const set = k => e => setForm(f => ({ ...f, [k]: e.target.value }));

  const saveDraft = async () => {
    setSaving(true); setError('');
    try {
      let sub;
      if (submissionId) {
        sub = await api.patch(`/kyc/submissions/${submissionId}/`, form, token);
      } else {
        sub = await api.post('/kyc/submissions/', form, token);
        setSubmissionId(sub.id);
      }
      return sub;
    } catch (e) {
      setError('Failed to save draft');
      return null;
    } finally { setSaving(false); }
  };

  const uploadDoc = async (docType, file) => {
    if (!submissionId) {
      setError('Save draft first before uploading'); return;
    }
    const fd = new FormData();
    fd.append('doc_type', docType);
    fd.append('file', file);
    try {
      const doc = await api.upload(`/kyc/submissions/${submissionId}/documents/`, fd, token);
      setUploadedDocs(prev => ({ ...prev, [docType]: doc }));
    } catch (e) {
      const msg = e.data?.file?.[0] || e.data?.non_field_errors?.[0] || 'Upload failed';
      setError(msg);
    }
  };

  const handleNext = async () => {
    if (step === 0 || step === 1) {
      const sub = await saveDraft();
      if (!sub) return;
    }
    setStep(s => s + 1);
  };

  const handleSubmit = async () => {
    if (!submissionId) { setError('Save draft first'); return; }
    setLoading(true); setError('');
    try {
      await saveDraft();
      await api.post(`/kyc/submissions/${submissionId}/submit/`, {}, token);
      onDone();
    } catch (e) {
      setError(e.data?.detail || 'Submission failed');
    } finally { setLoading(false); }
  };

  return (
    <div>
      <div className="page-header">
        <div className="page-title">{existing ? 'Edit KYC Application' : 'New KYC Application'}</div>
        <div className="page-sub">Complete all steps to submit your verification</div>
      </div>

      {/* Steps */}
      <div className="steps">
        {STEPS.map((s, i) => (
          <React.Fragment key={i}>
            <div className={`step ${i === step ? 'active' : i < step ? 'done' : ''}`}>
              <div className="step-dot">{i < step ? '✓' : i + 1}</div>
              <span className="step-label">{s}</span>
            </div>
            {i < STEPS.length - 1 && <div className="step-line" />}
          </React.Fragment>
        ))}
      </div>

      {error && <Alert type="error">{error}</Alert>}

      <div className="card">
        {step === 0 && (
          <div>
            <div className="form-section-title">Personal Information</div>
            <div className="grid-2">
              <div className="form-group">
                <label className="form-label">Full Name *</label>
                <input className="form-input" value={form.full_name} onChange={set('full_name')} placeholder="As per PAN card" />
              </div>
              <div className="form-group">
                <label className="form-label">Date of Birth</label>
                <input className="form-input" type="date" value={form.date_of_birth} onChange={set('date_of_birth')} />
              </div>
              <div className="form-group">
                <label className="form-label">PAN Number</label>
                <input className="form-input" value={form.pan_number} onChange={set('pan_number')} placeholder="ABCDE1234F" maxLength={10} style={{fontFamily:'var(--mono)', textTransform:'uppercase'}} />
                <div className="form-hint">10-character alphanumeric</div>
              </div>
              <div className="form-group">
                <label className="form-label">Aadhaar Number</label>
                <input className="form-input" value={form.aadhaar_number} onChange={set('aadhaar_number')} placeholder="12 digits" maxLength={12} style={{fontFamily:'var(--mono)'}} />
              </div>
            </div>
          </div>
        )}

        {step === 1 && (
          <div>
            <div className="form-section-title">Business Information</div>
            <div className="grid-2">
              <div className="form-group">
                <label className="form-label">Business Name *</label>
                <input className="form-input" value={form.business_name} onChange={set('business_name')} placeholder="Registered business name" />
              </div>
              <div className="form-group">
                <label className="form-label">Business Type</label>
                <select className="form-input" value={form.business_type} onChange={set('business_type')}>
                  <option value="">Select type</option>
                  <option value="sole_proprietorship">Sole Proprietorship</option>
                  <option value="partnership">Partnership</option>
                  <option value="llp">LLP</option>
                  <option value="private_limited">Private Limited</option>
                  <option value="freelancer">Freelancer</option>
                </select>
              </div>
              <div className="form-group">
                <label className="form-label">GST Number</label>
                <input className="form-input" value={form.gst_number} onChange={set('gst_number')} placeholder="Optional" style={{fontFamily:'var(--mono)'}} />
              </div>
            </div>
            <div className="form-group">
              <label className="form-label">Business Address</label>
              <textarea className="form-input" value={form.business_address} onChange={set('business_address')} rows={3} placeholder="Full registered address" />
            </div>
            <div className="form-section-title" style={{marginTop:20}}>Bank Details</div>
            <div className="grid-3">
              <div className="form-group">
                <label className="form-label">Account Number</label>
                <input className="form-input" value={form.bank_account_number} onChange={set('bank_account_number')} style={{fontFamily:'var(--mono)'}} />
              </div>
              <div className="form-group">
                <label className="form-label">IFSC Code</label>
                <input className="form-input" value={form.bank_ifsc_code} onChange={set('bank_ifsc_code')} placeholder="ABCD0123456" maxLength={11} style={{fontFamily:'var(--mono)', textTransform:'uppercase'}} />
              </div>
              <div className="form-group">
                <label className="form-label">Bank Name</label>
                <input className="form-input" value={form.bank_name} onChange={set('bank_name')} />
              </div>
            </div>
          </div>
        )}

        {step === 2 && (
          <div>
            <div className="form-section-title">Document Upload</div>
            {!submissionId && (
              <Alert type="amber">Save your information first (click Next on previous steps) before uploading documents.</Alert>
            )}
            <div className="doc-grid">
              {['pan', 'aadhaar', 'bank_statement', 'business_proof'].map(dt => (
                <DocUploadZone key={dt} docType={dt} uploaded={uploadedDocs[dt]}
                  disabled={!submissionId}
                  onFile={file => uploadDoc(dt, file)} />
              ))}
            </div>
          </div>
        )}

        {step === 3 && (
          <div>
            <div className="form-section-title">Review Your Application</div>
            <div className="grid-2">
              <div>
                <div className="detail-section-title">Personal</div>
                {[['Full Name', form.full_name], ['PAN', form.pan_number], ['Aadhaar', form.aadhaar_number], ['DOB', form.date_of_birth]].map(([l, v]) => (
                  <div key={l} className="detail-field">
                    <div className="detail-field-label">{l}</div>
                    <div className="detail-field-value detail-field-mono">{v || '—'}</div>
                  </div>
                ))}
              </div>
              <div>
                <div className="detail-section-title">Business</div>
                {[['Business', form.business_name], ['Type', form.business_type], ['GST', form.gst_number], ['Bank', form.bank_name], ['IFSC', form.bank_ifsc_code]].map(([l, v]) => (
                  <div key={l} className="detail-field">
                    <div className="detail-field-label">{l}</div>
                    <div className="detail-field-value detail-field-mono">{v || '—'}</div>
                  </div>
                ))}
              </div>
            </div>
            <div style={{marginTop:16}}>
              <div className="detail-section-title">Uploaded Documents</div>
              <div style={{display:'flex', gap:8, flexWrap:'wrap'}}>
                {Object.keys(uploadedDocs).map(dt => (
                  <span key={dt} className="badge badge-approved">✓ {DOC_LABELS[dt]}</span>
                ))}
                {Object.keys(uploadedDocs).length === 0 && <span style={{color:'var(--text-3)', fontSize:13}}>No documents uploaded</span>}
              </div>
            </div>

        <div style={{display:'flex', justifyContent:'space-between', marginTop:24, paddingTop:20, borderTop:'1px solid var(--border)'}}>
          <button className="btn btn-ghost" onClick={() => setStep(s => s - 1)} disabled={step === 0}>← Back</button>
          <div style={{display:'flex', gap:10}}>
            {step < 3 && (
              <button className="btn btn-ghost btn-sm" onClick={saveDraft} disabled={saving}>
                {saving ? <Spinner /> : '💾 Save Draft'}
              </button>
            )}
            {step < 3 ? (
              <button className="btn btn-primary" onClick={handleNext} disabled={saving}>
                {saving ? <Spinner /> : 'Next →'}
              </button>
            ) : (
              <button className="btn btn-primary" onClick={handleSubmit} disabled={loading}>
                {loading ? <Spinner /> : '🚀 Submit for Review'}
              </button>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

function DocUploadZone({ docType, uploaded, onFile, disabled }) {
  const ref = useRef();
  const [drag, setDrag] = useState(false);

  const handleFile = f => {
    if (f) onFile(f);
  };

  return (
    <div
      className={`upload-zone ${uploaded ? 'uploaded' : ''} ${drag ? 'drag-over' : ''} ${disabled ? '' : ''}`}
      style={disabled ? {opacity:0.5, pointerEvents:'none'} : {}}
      onClick={() => ref.current.click()}
      onDragOver={e => { e.preventDefault(); setDrag(true); }}
      onDragLeave={() => setDrag(false)}
      onDrop={e => { e.preventDefault(); setDrag(false); handleFile(e.dataTransfer.files[0]); }}
    >
      <input ref={ref} type="file" accept=".pdf,.jpg,.jpeg,.png" style={{display:'none'}}
        onChange={e => handleFile(e.target.files[0])} />
      <div className="upload-icon">{uploaded ? '✅' : '📄'}</div>
      <div className="upload-label">{DOC_LABELS[docType]}</div>
      {uploaded
        ? <div className="upload-sub" style={{color:'var(--green)'}}>✓ {uploaded.original_filename} ({uploaded.file_size_mb}MB)</div>
        : <div className="upload-sub">PDF, JPG, PNG · Max 5MB · Click or drop</div>
      }
    </div>
  );
}

function ReviewerDetail({ token, submissionId, onBack, onAction }) {
  const [data, setData] = useState(null);
  const [events, setEvents] = useState([]);
  const [modal, setModal] = useState(null); // 'approve' | 'reject' | 'request_info'
  const [reason, setReason] = useState('');
  const [notes, setNotes] = useState('');
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');

  const load = async () => {
    const [d, e] = await Promise.all([
      api.get(`/kyc/reviewer/submissions/${submissionId}/`, token),
      api.get(`/notifications/submission/${submissionId}/`, token),
    ]);
    setData(d);
    setEvents(e.results || e);
  };

  useEffect(() => { load(); }, []);

  const pickup = async () => {
    try {
      await api.post(`/kyc/reviewer/submissions/${submissionId}/pickup/`, {}, token);
      await load();
    } catch (e) {
      setError(e.data?.detail || 'Failed');
    }
  };

  const doAction = async () => {
    setLoading(true); setError('');
    const actionMap = { approve: 'approve', reject: 'reject', request_info: 'request_info' };
    try {
      await api.post(`/kyc/reviewer/submissions/${submissionId}/action/`, {
        action: actionMap[modal], reason, notes
      }, token);
      setModal(null); setReason(''); setNotes('');
      await load(); onAction();
    } catch (e) {
      setError(e.data?.detail || e.data?.reason?.[0] || e.data?.notes?.[0] || 'Action failed');
    } finally { setLoading(false); }
  };

  if (!data) return <div style={{textAlign:'center',padding:40}}><Spinner /></div>;

  const canPickup = data.status === 'submitted';
  const canAct = data.status === 'under_review';

  return (
    <div>
      <div style={{display:'flex', alignItems:'center', gap:12, marginBottom:24}}>
        <button className="btn btn-ghost btn-sm" onClick={onBack}>← Back</button>
        <div className="page-title" style={{fontSize:20}}>
          Application #{data.id} · {data.merchant?.full_name}
        </div>
        <StatusBadge status={data.status} />
        {data.is_at_risk && <span className="at-risk-chip">⚡ {data.hours_in_review}h — SLA AT RISK</span>}
      </div>

      {error && <Alert type="error">{error}</Alert>}

      {/* Action buttons */}
      {canPickup && (
        <div className="card" style={{marginBottom:16, display:'flex', alignItems:'center', gap:12}}>
          <div style={{flex:1}}>
            <div style={{fontWeight:600}}>Ready to review</div>
            <div style={{fontSize:13, color:'var(--text-3)'}}>Pick up this submission to start reviewing</div>
          </div>
          <button className="btn btn-primary" onClick={pickup}>🔍 Pick Up for Review</button>
        </div>
      )}

      {canAct && (
        <div className="card" style={{marginBottom:16}}>
          <div style={{fontWeight:600, marginBottom:12}}>Take Action</div>
          <div style={{display:'flex', gap:10}}>
            <button className="btn btn-success" onClick={() => setModal('approve')}>✅ Approve</button>
            <button className="btn btn-danger" onClick={() => setModal('reject')}>❌ Reject</button>
            <button className="btn btn-amber" onClick={() => setModal('request_info')}>💬 Request Info</button>
          </div>
        </div>
      )}

      <div className="detail-wrap">
        <div>
          {data.more_info_notes && (
            <Alert type="amber" ><strong>More info requested:</strong> {data.more_info_notes}</Alert>
          )}
          {data.rejection_reason && (
            <Alert type="error"><strong>Rejection reason:</strong> {data.rejection_reason}</Alert>
          )}
          <div className="card" style={{marginBottom:16}}>
            <div className="detail-section-title">Personal</div>
            <div className="grid-2">
              {[['Full Name', data.full_name], ['DOB', data.date_of_birth], ['PAN', data.pan_number], ['Aadhaar', data.aadhaar_number]].map(([l,v]) => (
                <div key={l} className="detail-field">
                  <div className="detail-field-label">{l}</div>
                  <div className="detail-field-value detail-field-mono">{v || '—'}</div>
                </div>
              ))}
            </div>
          </div>
          <div className="card" style={{marginBottom:16}}>
            <div className="detail-section-title">Business & Bank</div>
            <div className="grid-2">
              {[['Business', data.business_name], ['Type', data.business_type], ['GST', data.gst_number], ['Address', data.business_address], ['Bank', data.bank_name], ['IFSC', data.bank_ifsc_code], ['Account', data.bank_account_number]].map(([l,v]) => (
                <div key={l} className="detail-field">
                  <div className="detail-field-label">{l}</div>
                  <div className="detail-field-value detail-field-mono">{v || '—'}</div>
                </div>
              ))}
            </div>
          </div>
          <div className="card">
            <div className="detail-section-title">Documents ({data.documents?.length || 0})</div>
            <div className="doc-grid">
              {data.documents?.map(d => (
                <div key={d.id} className="doc-card">
                  <div className="doc-type">{DOC_LABELS[d.doc_type]}</div>
                  <div className="doc-name">{d.original_filename}</div>
                  <div className="doc-meta">{d.file_size_mb}MB · {d.mime_type}</div>
                  {d.file_url && <a href={d.file_url} target="_blank" rel="noreferrer" style={{fontSize:11, color:'var(--accent)', display:'block', marginTop:4}}>View file ↗</a>}
                </div>
              ))}
              {(!data.documents || data.documents.length === 0) && <span style={{color:'var(--text-3)', fontSize:13}}>No documents</span>}
            </div>
          </div>
        </div>

        <div>
          <div className="card" style={{marginBottom:16}}>
            <div className="detail-section-title">Submission Info</div>
            {[['Reviewer', data.reviewer?.full_name || 'Unassigned'], ['Submitted', formatDate(data.submitted_at)], ['Reviewed', formatDate(data.reviewed_at)], ['Hours in Review', `${data.hours_in_review}h`]].map(([l,v]) => (
              <div key={l} className="detail-field">
                <div className="detail-field-label">{l}</div>
                <div className="detail-field-value">{v}</div>
              </div>
            ))}
          </div>
          <div className="card">
            <div className="detail-section-title">Activity Log</div>
            <AuditTimeline events={events} />
          </div>
        </div>
      </div>

      {/* Action Modal */}
      {modal && (
        <div className="modal-overlay">
          <div className="modal">
            <div className="modal-title">
              {modal === 'approve' && '✅ Approve Application'}
              {modal === 'reject' && '❌ Reject Application'}
              {modal === 'request_info' && '💬 Request More Info'}
            </div>
            <div className="modal-sub">
              {modal === 'approve' && 'This merchant will be verified and can receive payments.'}
              {modal === 'reject' && 'Provide a clear reason for rejection.'}
              {modal === 'request_info' && 'Specify what additional information is needed.'}
            </div>
            {error && <Alert type="error">{error}</Alert>}
            {modal === 'reject' && (
              <div className="form-group">
                <label className="form-label">Rejection Reason *</label>
                <textarea className="form-input" value={reason} onChange={e => setReason(e.target.value)}
                  placeholder="Explain why the application is rejected..." rows={4} />
              </div>
            )}
            {modal === 'request_info' && (
              <div className="form-group">
                <label className="form-label">Notes for Merchant *</label>
                <textarea className="form-input" value={notes} onChange={e => setNotes(e.target.value)}
                  placeholder="What additional information or documents are needed?" rows={4} />
              </div>
            )}
            <div className="modal-actions">
              <button className="btn btn-ghost" onClick={() => { setModal(null); setError(''); }}>Cancel</button>
              <button className={`btn ${modal === 'approve' ? 'btn-success' : modal === 'reject' ? 'btn-danger' : 'btn-amber'}`}
                onClick={doAction} disabled={loading}>
                {loading ? <Spinner /> : 'Confirm'}
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── Audit Timeline ───────────────────────────────────────────────────────────
function AuditTimeline({ events }) {
  const icons = {
    created: '📋', submitted: '📤', picked_up: '🔍',
    approve: '✅', reject: '❌', request_info: '💬', document_uploaded: '📎', comment: '💭'
  };
  const labels = {
    created: 'Created', submitted: 'Submitted', picked_up: 'Picked Up',
    approve: 'Approved', reject: 'Rejected', request_info: 'Info Requested',
    document_uploaded: 'Document Uploaded', comment: 'Comment'
  };

  if (!events || events.length === 0) {
    return <div style={{color:'var(--text-3)', fontSize:13}}>No activity yet</div>;
  }

  return (
    <div className="timeline">
      {events.map((e, i) => (
        <div key={e.id} className="timeline-item">
          <div className="timeline-line" />
          <div className="timeline-dot">{icons[e.event_type] || '●'}</div>
          <div className="timeline-content">
            <div className="timeline-title">{labels[e.event_type] || e.event_type}</div>
            <div className="timeline-sub">by {e.actor_name} · {formatDate(e.created_at)}</div>
            {e.notes && <div className="timeline-note">{e.notes}</div>}
          </div>
        </div>
      ))}
    </div>
  );
}

// ─── App Shell ────────────────────────────────────────────────────────────────
function Sidebar({ user, navView, setNavView, onLogout, stats }) {
  const merchantNav = [
    { key: 'dashboard', icon: '🏠', label: 'My Applications' },
  ];
  const reviewerNav = [
    { key: 'dashboard', icon: '📊', label: 'Dashboard' },
  ];
  const nav = user.role === 'merchant' ? merchantNav : reviewerNav;

  return (
    <div className="sidebar">
      <div className="brand">
        <div className="brand-logo">
          <div className="brand-dot">▲</div>
          Playto KYC
        </div>
        <div className="brand-sub">Merchant Verification System</div>
      </div>
      <div className="nav">
        <div className="nav-section-label">{user.role === 'merchant' ? 'Merchant' : 'Reviewer'}</div>
        {nav.map(n => (
          <button key={n.key} className={`nav-item ${navView === n.key ? 'active' : ''}`}
            onClick={() => setNavView(n.key)}>
            <span className="icon">{n.icon}</span>
            {n.label}
            {n.badge && n.badge > 0 && <span className={`nav-badge ${n.badgeCls || ''}`}>{n.badge}</span>}
          </button>
        ))}
      </div>
      <div className="user-card">
        <div className="user-card-name">{user.full_name}</div>
        <div className="user-card-role">{user.role} · {user.email}</div>
        <div className="user-card-actions">
          <button className="btn btn-ghost btn-sm" style={{flex:1}} onClick={onLogout}>Sign Out</button>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [token, setToken] = useState(() => localStorage.getItem('kyc_token'));
  const [user, setUser] = useState(() => {
    const u = localStorage.getItem('kyc_user');
    return u ? JSON.parse(u) : null;
  });
  const [navView, setNavView] = useState('dashboard');

  const onLogin = (t, u) => {
    setToken(t); setUser(u);
    localStorage.setItem('kyc_token', t);
    localStorage.setItem('kyc_user', JSON.stringify(u));
  };
  const onLogout = () => {
    api.post('/auth/logout/', {}, token).catch(() => {});
    setToken(null); setUser(null);
    localStorage.removeItem('kyc_token');
    localStorage.removeItem('kyc_user');
  };

  if (!token || !user) return <AuthPage onLogin={onLogin} />;

  return (
    <div className="app">
      <Sidebar user={user} navView={navView} setNavView={setNavView} onLogout={onLogout} />
      <div className="main">
        {user.role === 'merchant'
          ? <MerchantDashboard token={token} user={user} />
          : <ReviewerDashboard token={token} user={user} />
        }
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
